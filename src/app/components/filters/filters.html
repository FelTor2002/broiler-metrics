<div class="filters-grid">
  <label>
    {{ t('filters.title.lote') }}
    <select [(ngModel)]="filters.lote" (change)="apply()">
      <option value="all">{{ t('common.all') }}</option>
      @for (lote of lotes; track lote) {
        <option [value]="lote">{{ lote }}</option>
      }
    </select>
  </label>

  <label>
    {{ t('filters.title.galpon') }}
    <select [(ngModel)]="filters.galpon" (change)="apply()">
      <option value="all">{{ t('common.all') }}</option>
      @for (galpon of galpones; track galpon) {
        <option [value]="galpon">{{ galpon }}</option>
      }
    </select>
  </label>

  <label>
    {{ t('filters.title.start') }}
    <input type="date" [(ngModel)]="filters.fechaInicio" (change)="apply()" />
  </label>

  <label>
    {{ t('filters.title.end') }}
    <input type="date" [(ngModel)]="filters.fechaFin" (change)="apply()" />
  </label>

  <label>
    {{ t('filters.title.status') }}
    <select [(ngModel)]="filters.estado_alerta" (change)="apply()">
      <option value="all">{{ t('common.all') }}</option>
      <option value="normal">{{ t('status.normal') }}</option>
      <option value="alert">{{ t('status.alert') }}</option>
      <option value="critical">{{ t('status.critical') }}</option>
    </select>
  </label>

  <label>
    {{ t('filters.title.search') }}
    <input type="text" [placeholder]="t('filters.searchPlaceholder')" [(ngModel)]="filters.busqueda" (input)="apply()" />
  </label>
</div>

<div class="filters-actions">
  <button type="button" (click)="clear()">{{ t('common.clearFilters') }}</button>
</div>
