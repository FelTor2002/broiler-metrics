<div class="charts-grid">
  <article class="chart-card">
    <h3>{{ t('charts.weightByAge') }}</h3>
    <div class="canvas-wrap">
      <canvas baseChart [data]="lineWeightData" [options]="lineOptions" type="line"></canvas>
    </div>
  </article>

  <article class="chart-card">
    <h3>{{ t('charts.mortalityByDay') }}</h3>
    <div class="canvas-wrap">
      <canvas baseChart [data]="lineMortalityData" [options]="lineOptions" type="line"></canvas>
    </div>
  </article>

  <article class="chart-card">
    <h3>{{ t('charts.feedByLot') }}</h3>
    <div class="canvas-wrap">
      <canvas baseChart [data]="barFeedData" [options]="barOptions" type="bar"></canvas>
    </div>
  </article>

  <article class="chart-card">
    <h3>{{ t('charts.fcrByLot') }}</h3>
    <div class="canvas-wrap">
      <canvas baseChart [data]="barFcrData" [options]="barOptions" type="bar"></canvas>
    </div>
  </article>

  <article class="chart-card full-width">
    <h3>{{ t('charts.stateDistribution') }}</h3>
    <div class="canvas-wrap canvas-wrap-small">
      <canvas baseChart [data]="stateDistributionData" [options]="doughnutOptions" type="doughnut"></canvas>
    </div>
  </article>
</div>
