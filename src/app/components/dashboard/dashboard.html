<div class="dashboard-layout">
  <app-header />

  <main class="dashboard-main">
    <section class="dashboard-upload">
      <app-file-upload
        [selectedFileName]="selectedFileName"
        [loading]="loading"
        [errorMessage]="errorMessage"
        [successMessage]="successMessage"
        [previewRecords]="records"
        (fileSelected)="onFileSelected($event)"
        (clearData)="onClearData()"
        (loadDemo)="onLoadDemo()"
        (downloadTemplate)="onDownloadTemplate()"
      />
    </section>

    @if (!hasData) {
      <app-empty-state (loadDemo)="onLoadDemo()" />
    } @else {
      <section class="dashboard-filters">
        <app-filters [records]="calculatedRecords" [filters]="filters" (filtersChange)="onFiltersChange($event)" />
      </section>
      <section class="dashboard-kpis">
        <app-kpi-cards [kpis]="kpis" />
      </section>
      <section class="dashboard-alerts">
        <app-alerts [records]="filteredRecords" />
      </section>
      <section class="dashboard-charts">
        <app-charts [records]="filteredRecords" />
      </section>
      <section class="dashboard-table">
        <app-data-table [records]="filteredRecords" />
      </section>
    }
  </main>

  <app-footer />
</div>
